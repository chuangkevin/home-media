name: Deploy to Server via Tailscale

on:
  workflow_run:
    workflows: ["Build and Push Docker Images"]
    types:
      - completed
    branches:
      - main
  workflow_dispatch:  # 允許手動觸發

env:
  DOCKERHUB_USERNAME: kevin950805

jobs:
  deploy:
    runs-on: ubuntu-latest
    # 只在 CI 成功後執行
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:github-actions

      - name: Test Tailscale Connection
        run: |
          echo "Testing connection to deployment server..."
          tailscale status
          ping -c 3 ${{ secrets.DEPLOY_SERVER_IP }}

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.DEPLOY_SERVER_IP }} >> ~/.ssh/known_hosts

      - name: Deploy via SSH
        env:
          DEPLOY_SERVER_IP: ${{ secrets.DEPLOY_SERVER_IP }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          ssh -i ~/.ssh/deploy_key ${DEPLOY_USER}@${DEPLOY_SERVER_IP} '
            set -e

            # 重試函數：最多重試 3 次，每次間隔遞增
            retry_pull() {
              local max_attempts=3
              local attempt=1
              local delay=10

              while [ $attempt -le $max_attempts ]; do
                echo "🔄 Pulling Docker images (attempt $attempt/$max_attempts)..."
                if docker compose -f docker-compose.yml pull; then
                  echo "✅ Pull successful!"
                  return 0
                fi

                if [ $attempt -lt $max_attempts ]; then
                  echo "⚠️ Pull failed, retrying in ${delay}s..."
                  sleep $delay
                  delay=$((delay * 2))
                fi
                attempt=$((attempt + 1))
              done

              echo "❌ Pull failed after $max_attempts attempts"
              return 1
            }

            echo "📁 Navigating to deployment directory..."
            cd '"${DEPLOY_PATH}"'

            retry_pull

            echo "🛑 Stopping existing containers..."
            docker compose -f docker-compose.yml down --remove-orphans --timeout 30 || true

            echo "🧹 Force removing any leftover containers..."
            docker rm -f home-media-backend home-media-frontend 2>/dev/null || true
            sleep 3

            echo "🔍 Checking for remaining containers..."
            if docker ps -a --filter "name=home-media" -q | grep -q .; then
              echo "⚠️ Containers still exist, force killing..."
              docker ps -a --filter "name=home-media" -q | xargs -r docker rm -f 2>/dev/null || true
              sleep 2
            fi

            echo "🚀 Starting updated containers..."
            docker compose -f docker-compose.yml up -d --force-recreate

            echo "🧹 Cleaning up old images..."
            docker image prune -af --filter "until=24h" || true

            echo "✅ Deployment completed successfully!"
            docker compose -f docker-compose.yml ps
          '

      - name: Health Check
        env:
          DEPLOY_SERVER_IP: ${{ secrets.DEPLOY_SERVER_IP }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          echo "🏥 Performing health check via SSH..."

          # 用 docker exec 在 container 內部做 health check（port 3001 沒暴露到 host）
          for i in $(seq 1 24); do
            echo "  Attempt $i/24..."
            if ssh -i ~/.ssh/deploy_key ${DEPLOY_USER}@${DEPLOY_SERVER_IP} \
              'docker exec home-media-backend node -e "require(\"http\").get(\"http://localhost:3001/health\",(r)=>{process.exit(r.statusCode===200?0:1)}).on(\"error\",()=>process.exit(1))"' 2>/dev/null; then
              echo "✅ Health check passed!"
              exit 0
            fi
            sleep 5
          done

          # 失敗時輸出 container 狀態方便 debug
          ssh -i ~/.ssh/deploy_key ${DEPLOY_USER}@${DEPLOY_SERVER_IP} \
            'docker compose ps; docker logs home-media-backend --tail 30' || true

          echo "❌ Health check failed after 120 seconds"
          exit 1

      - name: Deployment Summary
        if: always()
        run: |
          echo "## 🚀 Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Server**: \`${{ secrets.DEPLOY_SERVER_IP }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Images**:" >> $GITHUB_STEP_SUMMARY
          echo "  - Frontend: \`${{ env.DOCKERHUB_USERNAME }}/home-media-frontend:latest\`" >> $GITHUB_STEP_SUMMARY
          echo "  - Backend: \`${{ env.DOCKERHUB_USERNAME }}/home-media-backend:latest\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Deployed at: $(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY

      - name: Notify on Failure
        if: failure()
        run: |
          echo "❌ Deployment failed! Please check the logs above." >> $GITHUB_STEP_SUMMARY
